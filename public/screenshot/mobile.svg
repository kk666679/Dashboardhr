<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&amp;family=Inter:wght@300;500;700&amp;display=swap');
            .title {
                font-family: 'Orbitron', sans-serif;
                font-weight: 700;
            }
            .subtitle {
                font-family: 'Inter', sans-serif;
                font-weight: 300;
            }
            .btn-text {
                font-family: 'Inter', sans-serif;
                font-weight: 700;
            }
        </style>

        <!-- Background Gradients -->
        <radialGradient id="bgGlow1" cx="20%" cy="20%" r="50%">
            <stop offset="0%" stop-color="rgba(120,100,255,0.35)" />
            <stop offset="100%" stop-color="rgba(120,100,255,0)" />
        </radialGradient>
        <radialGradient id="bgGlow2" cx="80%" cy="80%" r="40%">
            <stop offset="0%" stop-color="rgba(0,255,220,0.18)" />
            <stop offset="100%" stop-color="rgba(0,255,220,0)" />
        </radialGradient>
        <linearGradient id="bgBase" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#080816" />
            <stop offset="100%" stop-color="#03030b" />
        </linearGradient>

        <!-- Dot Grid Pattern -->
        <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="white" opacity="0.45" />
        </pattern>

        <!-- Planet Glow Filter -->
        <filter id="planetGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Text Glow Filter -->
        <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feFlood flood-color="#aa78ff" flood-opacity="0.6" result="color" />
            <feComposite in="color" in2="blur" operator="in" result="shadow" />
            <feMerge>
                <feMergeNode in="shadow" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Background Layer -->
    <rect width="375" height="812" fill="url(#bgBase)" />
    <rect width="375" height="812" fill="url(#bgGlow1)" />
    <rect width="375" height="812" fill="url(#bgGlow2)" />
    <rect width="375" height="812" fill="url(#dotGrid)" />

    <!-- Planets (Glowing Orbs) -->
    <circle cx="68" cy="195" r="17" fill="#79a8ff" filter="url(#planetGlow)" />
    <circle cx="307" cy="260" r="9" fill="#ff9331" filter="url(#planetGlow)" />
    <circle cx="270" cy="682" r="21" fill="#42ffe6" filter="url(#planetGlow)" />
    <circle cx="82" cy="666" r="8" fill="#ff4568" filter="url(#planetGlow)" />

    <!-- Main Content -->
    <g transform="translate(187.5, 0)">
        <!-- Title -->
        <text x="0" y="320" class="title" font-size="42" fill="#b08cff" text-anchor="middle" letter-spacing="4" filter="url(#textGlow)">
            CHEMMARA
        </text>
        <text x="0" y="380" class="title" font-size="42" fill="#b08cff" text-anchor="middle" letter-spacing="4" filter="url(#textGlow)">
            ENTERPRISE
        </text>

        <!-- Subtitle -->
        <text x="0" y="450" class="subtitle" font-size="11" fill="#b8b7d8" text-anchor="middle" letter-spacing="3">
            Smart Human Resource • Expatriate • Foreign Workers Management
        </text>

        <!-- Glass Card -->
        <rect x="-170" y="500" width="340" height="100" rx="10" fill="rgba(110,90,220,0.28)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

        <!-- Button -->
        <rect x="-152" y="518" width="304" height="64" rx="8" fill="#FFFFFF" />
        <text x="0" y="550" class="btn-text" font-size="16" fill="#000000" text-anchor="middle" dominant-baseline="central">
            🚀 Start Here
        </text>
    </g>
</svg>
